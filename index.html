<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRICDON | Premium Cricket Predictions</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0ff,#f0f,#06f);
  overflow:hidden;
  color:white;
}

/* Floating neon particles */
.particle{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  filter:blur(2px);
  animation: float 15s linear infinite;
}
@keyframes float{
  0% {transform:translateY(100vh) translateX(0);}
  100% {transform:translateY(-100vh) translateX(200px);}
}

/* Hero Card */
.hero-card{
  position:relative;
  z-index:2;
  background: rgba(0,0,0,0.7);
  border-radius:25px;
  padding:50px 40px;
  width:90%;
  max-width:500px;
  text-align:center;
  box-shadow:0 0 50px rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
}

/* Neon Glowing Title */
.title{
  font-size:48px;
  font-weight:900;
  color:#0ff;
  text-shadow:0 0 5px #0ff,0 0 20px #f0f,0 0 40px #06f;
  margin-bottom:10px;
  animation: neonGlow 2s infinite alternate;
}
@keyframes neonGlow{
  0%{text-shadow:0 0 5px #0ff,0 0 20px #f0f,0 0 40px #06f;}
  100%{text-shadow:0 0 20px #0ff,0 0 50px #f0f,0 0 80px #06f;}
}

/* Subtitle */
.subtitle{
  color:#ddd;
  font-size:16px;
  margin-bottom:30px;
}

/* Stats Panel */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-bottom:35px;
}
.stat-item{
  background: linear-gradient(135deg,#0ff,#f0f,#06f);
  border-radius:20px;
  padding:15px;
  text-align:center;
  color:#000;
  font-weight:700;
  transition: transform 0.3s, box-shadow 0.3s;
}
.stat-item:hover{
  transform: translateY(-5px);
  box-shadow:0 10px 30px rgba(255,255,255,0.4);
}

/* Join Button */
.join-btn{
  display:inline-block;
  padding:18px 35px;
  font-weight:700;
  font-size:16px;
  border-radius:50px;
  background: linear-gradient(135deg,#0ff,#f0f,#06f);
  color:#000;
  text-decoration:none;
  box-shadow:0 10px 30px rgba(255,255,255,0.4);
  position:relative;
  overflow:hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}
.join-btn:hover{
  transform: translateY(-5px);
  box-shadow:0 15px 50px rgba(255,255,255,0.7);
}

/* Footer */
.footer{
  margin-top:20px;
  font-size:12px;
  color:#ccc;
}
</style>
</head>
<body>

<!-- Neon particles -->
<div class="particle" style="left:10%; animation-duration:18s;"></div>
<div class="particle" style="left:70%; width:12px; height:12px; animation-duration:20s;"></div>
<div class="particle" style="left:50%; width:6px; height:6px; animation-duration:22s;"></div>

<!-- Hero Card -->
<div class="hero-card">
  <div class="title">CRICDON</div>
  <div class="subtitle">Accurate Cricket Predictions & Premium Insights</div>

  <div class="stats">
    <div class="stat-item">IPL 2024 Accuracy<br>68 / 74 Wins</div>
    <div class="stat-item">Experience<br>12+ Years</div>
    <div class="stat-item">Active Members<br><span id="counter">10,234+</span></div>
    <div class="stat-item">Free Updates<br>100%</div>
  </div>

  <a href="https://t.me/+pToMSc5OD9QyMzY1" target="_blank" class="join-btn">JOIN CRICDON TELEGRAM</a>
  <div class="footer">Trusted by thousands of cricket followers • 100% Free Updates</div>
</div>

<script>
let count = 10234;
setInterval(()=>{
  count++;
  document.getElementById("counter").innerText = count.toLocaleString()+"+";
},4000);
</script>

</body>
</html>
