<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRICDON | Premium Cricket Predictions</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center, #0b0d17 0%, #000000 100%);
  overflow:hidden;
  color:white;
}

/* Floating particles */
.particle{
  position:absolute;
  width:8px; height:8px;
  background:#facc15;
  border-radius:50%;
  opacity:0.5;
  animation: floatParticle linear infinite;
}
@keyframes floatParticle{
  0% {transform: translateY(100vh) translateX(0);}
  100% {transform: translateY(-100vh) translateX(200px);}
}

/* Hero Card */
.hero-card{
  position:relative;
  z-index:2;
  background: rgba(17,24,39,0.9);
  border-radius:30px;
  padding:50px 40px;
  width:90%;
  max-width:520px;
  text-align:center;
  box-shadow: 0 40px 120px rgba(250,204,21,0.5);
  overflow:hidden;
}

/* Glowing title */
.title{
  font-size:48px;
  font-weight:900;
  background: linear-gradient(90deg,#facc15,#eab308);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:0 0 20px #facc15,0 0 40px #eab308;
  margin-bottom:10px;
  animation: glow 2s infinite;
}
@keyframes glow{
  0%,100% {text-shadow:0 0 10px #facc15,0 0 20px #eab308;}
  50% {text-shadow:0 0 25px #facc15,0 0 50px #eab308;}
}

/* Subtitle */
.subtitle{
  color:#9ca3af;
  font-size:16px;
  margin-bottom:30px;
}

/* Curved stats panel */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-bottom:35px;
}
.stat-item{
  background: rgba(250,204,21,0.05);
  border-radius:20px;
  padding:15px;
  text-align:center;
  transition: transform 0.3s, box-shadow 0.3s;
}
.stat-item:hover{
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(250,204,21,0.4);
}
.stat-label{font-size:13px;color:#9ca3af;margin-bottom:5px;}
.stat-value{font-weight:700;color:#facc15;font-size:16px;}

/* Gradient join button */
.join-btn{
  display:inline-block;
  padding:18px 35px;
  font-weight:700;
  font-size:16px;
  border-radius:50px;
  background: linear-gradient(135deg,#facc15,#eab308);
  color:#111827;
  text-decoration:none;
  box-shadow:0 10px 30px rgba(250,204,21,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
  position:relative;
  overflow:hidden;
}
.join-btn:hover{
  transform: translateY(-5px);
  box-shadow:0 15px 40px rgba(250,204,21,0.7);
}

/* Footer */
.footer{
  margin-top:20px;
  font-size:12px;
  color:#6b7280;
}
</style>
</head>
<body>

<!-- Floating particles -->
<div class="particle" style="left:10%; animation-duration:18s;"></div>
<div class="particle" style="left:70%; width:12px; height:12px; animation-duration:20s;"></div>
<div class="particle" style="left:50%; width:6px; height:6px; animation-duration:22s;"></div>

<!-- Hero Card -->
<div class="hero-card">
  <div class="title">CRICDON</div>
  <div class="subtitle">Accurate Cricket Predictions & Premium Insights</div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">IPL 2024 Accuracy</div>
      <div class="stat-value">68 / 74 Wins</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Professional Experience</div>
      <div class="stat-value">12+ Years</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Active Members</div>
      <div class="stat-value" id="counter">10,234+</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Free Updates</div>
      <div class="stat-value">100%</div>
    </div>
  </div>

  <a href="https://t.me/+pToMSc5OD9QyMzY1" target="_blank" class="join-btn">JOIN CRICDON TELEGRAM</a>
  <div class="footer">Trusted by thousands of cricket followers • 100% Free Updates</div>
</div>

<script>
let count = 10234;
setInterval(()=>{
  count++;
  document.getElementById("counter").innerText = count.toLocaleString()+"+";
},4000);
</script>

</body>
</html>
